name: Build & push AI image

on:
  push:
    branches: [main]
    paths:
      - "AI/components/consumer-tracking/**"
      - "AI/components/pi-bridge/**"
      - "AI/components/producer-camera/**"
      - "AI/run-pi-stack.sh"
      - ".github/workflows/build-ai.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (cross-compile arm64 on x86 runner)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./AI/components/consumer-tracking
          file: ./AI/components/consumer-tracking/Dockerfile
          platforms: linux/arm64          # Raspberry Pi 5 is arm64
          push: true
          tags: |
            ghcr.io/hash-walker/bio-d-scan/ai:latest
            ghcr.io/hash-walker/bio-d-scan/ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
